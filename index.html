<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>imthefergus</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#050505;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
}

body::before{
    content:"";
    position:absolute;
    width:600px;
    height:600px;
    background:#00ff66;
    filter:blur(250px);
    opacity:.15;
}

.card{
    position:relative;
    width:90%;
    max-width:700px;
    text-align:center;
    background:rgba(20,20,20,.85);
    backdrop-filter:blur(12px);
    border:1px solid rgba(0,255,102,.3);
    border-radius:25px;
    padding:50px;
    box-shadow:0 0 40px rgba(0,255,102,.2);
}

.profile{
    width:170px;
    height:170px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #00ff66;
    box-shadow:0 0 25px #00ff66;
}

h1{
    margin-top:20px;
    color:#00ff66;
    font-size:42px;
}

.bio{
    margin-top:15px;
    font-size:22px;
    color:#dcdcdc;
}

.btn{
    display:inline-block;
    margin-top:30px;
    padding:15px 35px;
    background:#00ff66;
    color:black;
    text-decoration:none;
    font-weight:bold;
    border-radius:12px;
    transition:.3s;
}

.btn:hover{
    transform:translateY(-5px);
    box-shadow:0 0 20px #00ff66;
}

.footer{
    margin-top:30px;
    color:#888;
    font-size:14px;
}
</style>
</head>

<body>

<div class="card">

    <!-- عکس پروفایل -->
    <img src="file_000000003ff871f788a61889af676571.jpg" alt="Profile" class="profile">

    <h1>imthefergus</h1>

    <p class="bio">
        Content Creator
    </p>

    <a class="btn"
       href="https://instagram.com/imthefergus"
       target="_blank">
       Follow on Instagram
    </a>

    <div class="footer">
        © 2026 imthefergus
    </div>

</div>

</body>
</html>
