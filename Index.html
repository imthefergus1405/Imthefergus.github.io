<!DOCTYPE html>

    height:100vh;
    margin:0;
}

.card{
    text-align:center;
    padding:40px;

.bio{

    color:#ddd;

.btn{
    display:inline-block;
    padding:12px 25px;
    background:#00ff66;
    color:#000;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
}

<body>

<div class="card">
    <h1>imthefergus</h1>
    <p class="bio">Content Creator</p>
